<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embun Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #00d9ff; margin-bottom: 20px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .status { padding: 12px; border-radius: 8px; margin: 15px 0; font-weight: 600; }
        .connected { background: rgba(0,255,136,0.15); color: #00ff88; }
        .disconnected { background: rgba(255,107,107,0.15); color: #ff6b6b; }
        input, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #eee; margin: 8px 0; }
        button { background: linear-gradient(90deg, #00d9ff, #00ff88); color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 5px; }
        button:hover { opacity: 0.9; }
        .response { background: rgba(0,255,136,0.1); border-left: 3px solid #00ff88; padding: 15px; margin-top: 15px; border-radius: 0 6px 6px 0; }
        code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Embun Dashboard</h1>
        
        <div class="card">
            <h3>📊 Gateway Status</h3>
            <div id="status" class="status disconnected">🔍 Checking...</div>
            <div id="info" style="font-size: 13px; color: #aaa; margin-top: 10px;"></div>
        </div>
        
        <div class="card">
            <h3>💬 Chat with Embun</h3>
            <textarea id="message" placeholder="Type your message..." rows="4"></textarea>
            <button onclick="send()">🚀 Send</button>
        </div>
        
        <div id="response" class="card response" style="display:none;">
            <h4>📝 Response:</h4>
            <div id="response-content"></div>
        </div>
        
        <div class="card">
            <h3>📋 Today's Plan</h3>
            <div id="plan" style="margin-top: 10px; color: #aaa;">Loading...</div>
        </div>
    </div>

    <script>
        const GATEWAY = 'http://192.168.0.167:18789';
        
        window.addEventListener('load', () => {
            checkStatus();
            loadPlan();
        });
        
        async function checkStatus() {
            const s = document.getElementById('status');
            const info = document.getElementById('info');
            try {
                const r = await fetch(GATEWAY + '/');
                if (r.ok) {
                    s.textContent = '✅ CONNECTED TO OPENCLAW!';
                    s.className = 'status connected';
                    info.textContent = 'Gateway: ' + GATEWAY + ' | Model: qwen3.5-plus';
                } else {
                    throw new Error('Status ' + r.status);
                }
            } catch (e) {
                s.textContent = '❌ DISCONNECTED';
                s.className = 'status disconnected';
                info.textContent = 'Error: ' + e.message;
            }
        }
        
        async function loadPlan() {
            const p = document.getElementById('plan');
            try {
                const r = await fetch('https://raw.githubusercontent.com/iqbalmuhaider-dot/mission-control/main/plans.json');
                if (r.ok) {
                    const d = await r.json();
                    const today = new Date().toISOString().split('T')[0];
                    p.textContent = d.plans?.[today] || 'No plan for today';
                } else {
                    p.textContent = 'Loading plan...';
                }
            } catch (e) {
                p.textContent = 'Follow up dengan banker\nUpdate laptop makmal\nCheck ID Delima murid tahun 1\nFollow up banner Semarak Kasih Ramadan';
            }
        }
        
        async function send() {
            const msg = document.getElementById('message').value.trim();
            if (!msg) return alert('Enter message!');
            
            const rd = document.getElementById('response');
            const rc = document.getElementById('response-content');
            rd.style.display = 'block';
            rc.innerHTML = '<p>🤔 Embun is thinking...</p>';
            
            // Use sessions_send via OpenClaw
            try {
                const r = await fetch(GATEWAY + '/api/sessions/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: msg,
                        timeoutSeconds: 30
                    })
                });
                
                if (r.ok) {
                    const d = await r.json();
                    rc.innerHTML = '<p>' + (d.message || 'Message sent!') + '</p>';
                } else {
                    rc.innerHTML = '<p style="color:#ff6b6b">❌ Error: ' + r.status + '</p>';
                }
            } catch (e) {
                rc.innerHTML = '<p style="color:#ff6b6b">❌ Error: ' + e.message + '</p>';
            }
        }
    </script>
</body>
</html>
